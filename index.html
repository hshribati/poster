<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soteria - Smart Emergency Monitoring & Evacuation System</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-red: #d32f2f; 
            --dark-grey: #2c3e50;
            --light-grey: #f1f5f9;
            --border-color: #e2e8f0;
            --text-main: #1e293b;
            --accent-green: #166534;
            --bg-dark: #0f172a;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Barlow', sans-serif;
            margin: 0;
            padding: 40px;
            /* MODERN COOL BACKGROUND */
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(at 0% 0%, rgba(211, 47, 47, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(30, 41, 59, 0.4) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(46, 125, 50, 0.1) 0px, transparent 50%);
            color: var(--text-main);
            line-height: 1.4;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        .poster-container {
            /* WIDER FORMAT (Landscape) */
            max-width: 1800px;
            width: 100%;
            margin: 0 auto;
            background-color: #ffffff;
            border-radius: 16px;
            padding: 60px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        header {
            text-align: center;
            border-bottom: 6px solid var(--primary-red);
            padding-bottom: 30px;
            margin-bottom: 40px;
        }

        .university-tag {
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 3px;
            font-size: 1.1rem;
            color: #64748b;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 5.5rem;
            margin: 0;
            text-transform: uppercase;
            color: var(--primary-red);
            letter-spacing: -3px;
            line-height: 1;
        }

        .subtitle {
            font-size: 1.8rem;
            font-weight: 400;
            color: var(--dark-grey);
            margin-top: 10px;
        }

        /* THREE COLUMN GRID FOR WIDE VIEW */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1.2fr 1fr;
            gap: 50px;
        }

        section { margin-bottom: 35px; }

        h2 {
            background-color: var(--primary-red);
            color: white;
            padding: 12px 20px;
            font-size: 1.3rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-top: 0;
            border-radius: 4px;
            display: inline-block;
            margin-bottom: 20px;
        }

        .step-box {
            display: flex;
            align-items: flex-start;
            background: var(--light-grey);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 12px;
            border: 1px solid var(--border-color);
        }

        .step-number {
            background: var(--dark-grey);
            color: white;
            font-weight: 700;
            min-width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            border-radius: 50%;
            font-size: 0.9rem;
        }

        .system-diagram {
            width: 100%;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: #fff;
            margin: 15px 0;
            transition: transform 0.3s ease;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            font-size: 1rem;
        }

        th, td {
            text-align: left;
            padding: 14px;
            border-bottom: 1px solid var(--border-color);
        }

        th { background-color: var(--light-grey); font-weight: 700; }

        .total-row {
            font-weight: 700;
            color: var(--primary-red);
            font-size: 1.2rem;
            background-color: #fef2f2;
        }

        .highlight-card {
            background: #f0fdf4;
            padding: 20px;
            border-left: 6px solid #22c55e;
            margin-top: 20px;
            font-weight: 600;
            color: var(--accent-green);
            border-radius: 0 8px 8px 0;
        }

        footer {
            margin-top: 50px;
            padding-top: 30px;
            border-top: 2px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            color: #6
